      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password12345
      - JWT_SECRET=polyglot_jwt_secret_key_2026
      - JWT_ALGORITHM=HS256

# ==============================================================================
# VOLUMES — постоянное хранение данных
# Docker volumes сохраняют данные между перезапусками контейнеров.
# Без volumes при docker compose down данные удалятся.
# ==============================================================================
volumes:
  postgres_data:      # Данные PostgreSQL (12 таблиц)
  es_data:            # Данные ElasticSearch (pg_* индексы + lectures)
  neo4j_data:         # Данные Neo4j (узлы + связи)
  redis_data:         # Данные Redis (кешированные student/student_group)
  mongo_data:         # Данные MongoDB (flat_data + hierarchy)
  certs:              # SSL-сертификаты (CA, server, client)
  zk_data:            # Данные Zookeeper
  zk_logs:            # Логи Zookeeper
  kafka_data:         # Данные Kafka (топики с CDC-событиями)
  connect_data:       # Данные Kafka Connect (offsets, configs)
  influxdb_data:      # Метрики мониторинга
  grafana_data:       # Дашборды Grafana
