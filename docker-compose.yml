services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: university
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d university"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password12345
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password12345 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: password12345
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  cert-init:
    image: alpine:3.19
    volumes:
      - certs:/certs
    entrypoint: >
      sh -c "
        apk add --no-cache openssl
        if [ ! -f /certs/ca.crt ]; then
          echo 'Generating Root CA...'
          openssl genrsa -out /certs/ca.key 2048
          openssl req -x509 -new -nodes -key /certs/ca.key -sha256 -days 3650 -out /certs/ca.crt -subj '/CN=Polyglot Root CA'
        fi
        if [ ! -f /certs/server.crt ]; then
          echo 'Generating server certificate for nginx...'
          openssl genrsa -out /certs/server.key 2048
          openssl req -new -key /certs/server.key -out /certs/server.csr -subj '/CN=nginx'
          openssl x509 -req -in /certs/server.csr -CA /certs/ca.crt -CAkey /certs/ca.key -CAcreateserial -out /certs/server.crt -days 365 -sha256
          rm -f /certs/server.csr
        fi
        if [ ! -f /certs/client.crt ]; then
          echo 'Generating client certificate for gateway...'
          openssl genrsa -out /certs/client.key 2048
          openssl req -new -key /certs/client.key -out /certs/client.csr -subj '/CN=gateway'
          openssl x509 -req -in /certs/client.csr -CA /certs/ca.crt -CAkey /certs/ca.key -CAcreateserial -out /certs/client.crt -days 365 -sha256
          rm -f /certs/client.csr
        fi
        echo 'All certificates are ready.'
        chmod 644 /certs/ca.crt /certs/server.crt /certs/client.crt
        chmod 600 /certs/ca.key /certs/server.key /certs/client.key
      "

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./scripts/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/nginx/certs:ro
    depends_on:
      cert-init:
        condition: service_completed_successfully
      lab1:
        condition: service_started
      lab2:
        condition: service_started
      lab3:
        condition: service_started
    ports:
      - "443:443"

  generator:
    build: ./generator
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=university
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - ES_HOST=elasticsearch
      - ES_PORT=9200
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password12345
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_USER=mongo
      - MONGO_PASSWORD=password12345
      - MONGO_DB=university

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      cert-init:
        condition: service_completed_successfully
      nginx:
        condition: service_started
      generator:
        condition: service_started
    volumes:
      - certs:/certs:ro
    environment:
      - NGINX_URL=https://nginx:443
      - GENERATOR_URL=http://generator:8010
      - JWT_SECRET=polyglot_jwt_secret_key_2026
      - JWT_ALGORITHM=HS256
      - CERT_CA=/certs/ca.crt
      - CERT_CLIENT_CRT=/certs/client.crt
      - CERT_CLIENT_KEY=/certs/client.key

  lab1:
    build: ./lab1
    depends_on:
      elasticsearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ES_HOST=elasticsearch
      - ES_PORT=9200
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password12345
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=university
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=polyglot_jwt_secret_key_2026
      - JWT_ALGORITHM=HS256

  lab2:
    build: ./lab2
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=university
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password12345
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_USER=mongo
      - MONGO_PASSWORD=password12345
      - MONGO_DB=university
      - JWT_SECRET=polyglot_jwt_secret_key_2026
      - JWT_ALGORITHM=HS256

  lab3:
    build: ./lab3
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=university
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - ES_HOST=elasticsearch
      - ES_PORT=9200
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password12345
      - JWT_SECRET=polyglot_jwt_secret_key_2026
      - JWT_ALGORITHM=HS256

volumes:
  postgres_data:
  es_data:
  neo4j_data:
  redis_data:
  mongo_data:
  certs:
