# ==============================================================================
# Конфигурация PostgreSQL для CDC (Change Data Capture)
#
# Эти настройки необходимы для работы Debezium Source Connector:
# - wal_level=logical — включает логическую репликацию (WAL содержит
#   достаточно информации для извлечения изменений строк)
# - max_wal_senders — макс. число одновременных подключений репликации
# - max_replication_slots — макс. число слотов репликации (Debezium
#   создаёт свой слот debezium_slot)
# - wal_keep_size — минимальный размер WAL-файлов, которые хранятся
#   на случай если потребитель (Debezium) отстанет
# ==============================================================================

wal_level = logical
max_wal_senders = 4
max_replication_slots = 4
wal_keep_size = 256MB
listen_addresses = '*'
